# OpenViking 上下文数据库（Agent 外置记忆 + MCP 检索）
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openviking-data
  namespace: deer-flow
  labels:
    app.kubernetes.io/name: openviking
    app.kubernetes.io/component: storage
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openviking
  namespace: deer-flow
  labels:
    app.kubernetes.io/name: openviking
    app.kubernetes.io/component: context-db
spec:
  replicas: 1
  # RocksDB 不支持多 Pod 共享同一 PVC，使用 Recreate 避免滚动更新锁冲突
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: openviking
  template:
    metadata:
      labels:
        app: openviking
        app.kubernetes.io/name: openviking
    spec:
      containers:
        - name: openviking
          image: REPLACE_OPENVIKING_IMAGE
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 1933
          env:
            - name: OPENVIKING_WITH_BOT
              value: "0"
            - name: OPENVIKING_CONFIG_FILE
              value: /app/.openviking/ov.conf
            # Rancher Desktop / 部分虚拟化 CPU 无 AVX2，强制 SSE3 避免 SIGILL(exit 132)
            - name: OV_ENGINE_VARIANT
              value: SSE3
          volumeMounts:
            - name: data
              mountPath: /app/.openviking
            - name: config
              mountPath: /app/.openviking/ov.conf
              subPath: ov.conf
              readOnly: true
          readinessProbe:
            httpGet:
              path: /ready
              port: 1933
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 1933
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 768Mi
            limits:
              cpu: "2"
              memory: 1536Mi
      volumes:
        - name: config
          configMap:
            name: openviking-config
        - name: data
          persistentVolumeClaim:
            claimName: openviking-data
---
apiVersion: v1
kind: Service
metadata:
  name: openviking
  namespace: deer-flow
  labels:
    app.kubernetes.io/name: openviking
spec:
  selector:
    app: openviking
  ports:
    - name: http
      port: 1933
      targetPort: 1933
