apiVersion: apps/v1
kind: Deployment
metadata:
  name: deer-flow-frontend
  namespace: deer-flow
  labels:
    app.kubernetes.io/name: deer-flow-frontend
    app.kubernetes.io/component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: deer-flow-frontend
  template:
    metadata:
      labels:
        app: deer-flow-frontend
        app.kubernetes.io/name: deer-flow-frontend
    spec:
      containers:
        - name: frontend
          image: deer-flow-frontend:latest
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: DEER_FLOW_INTERNAL_GATEWAY_BASE_URL
              value: http://deer-flow-gateway:8001
          envFrom:
            - secretRef:
                name: deer-flow-env
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: deer-flow-frontend
  namespace: deer-flow
  labels:
    app.kubernetes.io/name: deer-flow-frontend
spec:
  selector:
    app: deer-flow-frontend
  ports:
    - name: http
      port: 3000
      targetPort: 3000
