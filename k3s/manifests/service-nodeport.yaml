# 对外暴露 Web 入口（Rancher Desktop 本机访问 http://localhost:32026）
apiVersion: v1
kind: Service
metadata:
  name: deer-flow-web
  namespace: deer-flow
  labels:
    app.kubernetes.io/name: deer-flow
    app.kubernetes.io/component: web-entry
spec:
  type: NodePort
  selector:
    app: deer-flow-nginx
  ports:
    - name: http
      port: 2026
      targetPort: 2026
      nodePort: 32026
